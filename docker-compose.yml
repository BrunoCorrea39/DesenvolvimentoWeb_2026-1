services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:////app/data/projetai.db
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-haiku-4-5}
      ANTHROPIC_VERSION: ${ANTHROPIC_VERSION:-2023-06-01}
    volumes:
      - ./backend/data:/app/data

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://127.0.0.1:8000/api
    depends_on:
      - backend
